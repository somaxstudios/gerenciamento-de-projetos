<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Polymusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen text-slate-800">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Catálogo de Projetos</h1>
                <p class="text-slate-500 text-lg">Gerencie a produção e os metadados dos lançamentos.</p>
            </div>

            <div class="flex flex-col lg:flex-row gap-3 w-full xl:w-auto">
                <input
                    type="text"
                    id="busca-projeto"
                    placeholder="Filtrar por nome..."
                    class="px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white min-w-[260px]"
                >

                <select
                    id="filtro-audio"
                    class="px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white min-w-[220px]"
                >
                    <option value="">Áudio: todos</option>
                    <option value="AINDA_NAO_TEM">Áudio não iniciado</option>
                    <option value="EM_ANDAMENTO">Áudio em andamento</option>
                    <option value="CONCLUIDO">Áudio concluído</option>
                </select>

                <select
                    id="filtro-capa"
                    class="px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-white min-w-[220px]"
                >
                    <option value="">Capa: todas</option>
                    <option value="AINDA_NAO_TEM">Capa não iniciada</option>
                    <option value="EM_ANDAMENTO">Capa em andamento</option>
                    <option value="CONCLUIDO">Capa concluída</option>
                </select>

                <a
                    href="criar-lancamento.html"
                    class="inline-flex items-center justify-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 transition shadow-sm"
                >
                    <span class="text-lg">＋</span>
                    Novo projeto
                </a>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Prioridade</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Projeto / Título</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Formato</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Áudio</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Capa</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Lançamento</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-projetos" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { carregarSidebar } from './js/sidebar.js';
        carregarSidebar();
    </script>
    <script type="module" src="./js/projetos.js"></script>
</body>
</html>
