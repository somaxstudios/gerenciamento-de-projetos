<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipe - Polymusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen text-slate-800">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Gestão de Equipe</h1>
                <p class="text-slate-500">Controle de acessos e cargos dos usuários do sistema.</p>
            </div>

            <div class="flex items-center gap-3">
                <input
                    type="text"
                    id="busca-usuario"
                    placeholder="Buscar por nome ou e-mail..."
                    class="w-full md:w-80 px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button
                    id="add-usuario"
                    class="bg-blue-600 text-white px-5 py-3 rounded-xl font-semibold hover:bg-blue-700 transition shadow-sm"
                >
                    Convidar membro
                </button>
            </div>
        </header>

        <section class="mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-sm text-slate-500">Total de membros</p>
                <h2 id="total-usuarios" class="text-3xl font-bold text-slate-900 mt-1">0</h2>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-sm text-slate-500">Administradores</p>
                <h2 id="total-admins" class="text-3xl font-bold text-slate-900 mt-1">0</h2>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-sm text-slate-500">Usuários ativos</p>
                <h2 id="total-ativos" class="text-3xl font-bold text-slate-900 mt-1">0</h2>
            </div>
        </section>

        <section
            id="grid-usuarios"
            class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"
        ></section>

        <div
            id="estado-vazio"
            class="hidden bg-white border border-dashed border-slate-300 rounded-2xl p-10 text-center text-slate-500"
        >
            Nenhum usuário encontrado.
        </div>
    </main>

    <div
        id="modal-usuario"
        class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 items-center justify-center p-4"
    >
        <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="flex items-center justify-between px-6 py-5 border-b border-slate-200">
                <div>
                    <h3 id="modal-titulo" class="text-xl font-bold text-slate-900">Convidar membro</h3>
                    <p class="text-sm text-slate-500">Preencha os dados do usuário.</p>
                </div>
                <button
                    id="fechar-modal"
                    class="w-10 h-10 rounded-full hover:bg-slate-100 text-slate-500 text-xl"
                    type="button"
                >
                    ×
                </button>
            </div>

            <form id="form-usuario" class="p-6 space-y-4">
                <input type="hidden" id="usuario-id" />

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                    <input
                        type="text"
                        id="usuario-nome"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                    <input
                        type="email"
                        id="usuario-email"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Cargo</label>
                        <select
                            id="usuario-cargo"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                            <option value="Administrador">Administrador</option>
                            <option value="Editor">Editor</option>
                            <option value="Operacional">Operacional</option>
                            <option value="Financeiro">Financeiro</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                        <select
                            id="usuario-status"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                            <option value="pendente">Pendente</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button
                        type="button"
                        id="cancelar-modal"
                        class="px-5 py-3 rounded-xl border border-slate-200 text-slate-700 hover:bg-slate-50"
                    >
                        Cancelar
                    </button>
                    <button
                        type="submit"
                        class="px-5 py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700"
                    >
                        Salvar usuário
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { carregarSidebar } from './js/sidebar.js';
        carregarSidebar();
    </script>
    <script type="module" src="./js/usuarios.js"></script>
</body>
</html>
