<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Polymusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen text-slate-800">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Catálogo de Projetos</h1>
                <p class="text-slate-500">Gerencie a produção e os metadados dos lançamentos.</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="busca-projeto" placeholder="Filtrar por nome..." class="px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <a href="criar-lancamento.html" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Novo</a>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Prioridade</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Projeto / Título</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Formato</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Áudio (SLA)</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Capa (SLA)</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase">Lançamento</th>
                            <th class="p-4 text-xs font-semibold text-slate-500 uppercase text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-projetos" class="divide-y divide-slate-100">
                        <!-- preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { carregarSidebar } from './js/sidebar.js';
        carregarSidebar();
    </script>
    <script type="module" src="./js/projetos.js"></script>
</body>
</html>
