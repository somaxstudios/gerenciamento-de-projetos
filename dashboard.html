<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Polymusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex h-screen text-slate-800">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900">Visão Geral</h1>
            <p class="text-slate-500">Acompanhe o status da produção e lançamentos.</p>
        </header>

        <!-- Cards de resumo -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500 uppercase">Total de Projetos</p>
                <p id="total-projetos" class="text-3xl font-bold mt-1 text-slate-900">--</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500 uppercase italic">Prioridades</p>
                <p id="total-prioridades" class="text-3xl font-bold mt-1 text-orange-600">--</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500 uppercase">Áudio em Aberto</p>
                <p id="audio-pendente" class="text-3xl font-bold mt-1 text-blue-600">--</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-sm font-medium text-slate-500 uppercase">Capas em Aberto</p>
                <p id="capa-pendente" class="text-3xl font-bold mt-1 text-purple-600">--</p>
            </div>
        </div>

        <!-- Listas detalhadas (cards horizontais) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Lançamentos Próximos (mantido) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center justify-between">
                    <span>📅 Lançamentos Próximos</span>
                    <span class="text-sm font-normal text-slate-400">(até 7 dias)</span>
                </h3>
                <div id="lista-proximos" class="space-y-4 text-sm">
                    <!-- preenchido via JS -->
                </div>
            </div>

            <!-- Áudio em Aberto (top 5) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center justify-between">
                    <span>🎧 Áudio em Aberto</span>
                    <span class="text-sm font-normal text-slate-400">top 5</span>
                </h3>
                <div id="lista-audio-pendente" class="space-y-3">
                    <!-- preenchido via JS -->
                </div>
                <div class="mt-3 text-right">
                    <a href="gerenciar-projetos.html?filtro=audio_pendente" class="text-sm text-blue-600 hover:underline">Ver todos</a>
                </div>
            </div>

            <!-- Capas em Aberto (top 5) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center justify-between">
                    <span>🖼️ Capas em Aberto</span>
                    <span class="text-sm font-normal text-slate-400">top 5</span>
                </h3>
                <div id="lista-capa-pendente" class="space-y-3">
                    <!-- preenchido via JS -->
                </div>
                <div class="mt-3 text-right">
                    <a href="gerenciar-projetos.html?filtro=capa_pendente" class="text-sm text-blue-600 hover:underline">Ver todos</a>
                </div>
            </div>

            <!-- Projetos Prontos (top 5) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4 text-slate-800 flex items-center justify-between">
                    <span>✅ Projetos Prontos</span>
                    <span class="text-sm font-normal text-slate-400">concluídos</span>
                </h3>
                <div id="lista-prontos" class="space-y-3">
                    <!-- preenchido via JS -->
                </div>
                <div class="mt-3 text-right">
                    <a href="gerenciar-projetos.html?filtro=prontos" class="text-sm text-blue-600 hover:underline">Ver todos</a>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { carregarSidebar } from './js/sidebar.js';
        carregarSidebar();
    </script>
    <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
